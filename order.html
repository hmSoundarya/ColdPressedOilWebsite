<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .total {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Place Your Order</h2>

    <form id="orderForm">
        <label>Customer Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Select Product</label>
        <select id="product" onchange="calculateTotal()">
            <option value="500">Product A - ₹500</option>
            <option value="1000">Product B - ₹1000</option>
            <option value="1500">Product C - ₹1500</option>
        </select>

        <label>Quantity</label>
        <input type="number" id="quantity" min="1" value="1" onchange="calculateTotal()">

        <div class="total">
            Total: ₹<span id="total">500</span>
        </div>

        <button type="submit">Place Order</button>
    </form>
</div>

<script>
    function calculateTotal() {
        let price = parseInt(document.getElementById("product").value);
        let quantity = parseInt(document.getElementById("quantity").value) || 1;
        let total = price * quantity;

        document.getElementById("total").textContent = total;
    }

    document.getElementById("orderForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let name = document.getElementById("name").value;
        let total = document.getElementById("total").textContent;

        alert(
            "Order Placed Successfully!\n\n" +
            "Customer: " + name + "\n" +
            "Total Amount: ₹" + total
        );

        this.reset();
        calculateTotal();
    });
</script>

</body>
</html>
